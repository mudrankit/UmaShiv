server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/system_design_assistant}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

app.ai.default-provider=${APP_AI_PROVIDER:demo}

app.ai.openai.api-key=${APP_AI_OPENAI_API_KEY:${APP_AI_API_KEY:}}
app.ai.openai.model=${APP_AI_OPENAI_MODEL:${APP_AI_MODEL:gpt-4o-mini}}
app.ai.openai.base-url=${APP_AI_OPENAI_BASE_URL:https://api.openai.com/v1/chat/completions}

app.ai.groq.api-key=${APP_AI_GROQ_API_KEY:}
app.ai.groq.model=${APP_AI_GROQ_MODEL:llama-3.1-8b-instant}
app.ai.groq.base-url=${APP_AI_GROQ_BASE_URL:https://api.groq.com/openai/v1/chat/completions}

app.ai.gemini.api-key=${APP_AI_GEMINI_API_KEY:}
app.ai.gemini.model=${APP_AI_GEMINI_MODEL:gemini-2.5-flash}
app.ai.gemini.base-url=${APP_AI_GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}

app.auth.google-client-id=${APP_AUTH_GOOGLE_CLIENT_ID:}
app.auth.session-days=${APP_AUTH_SESSION_DAYS:30}
app.web.allowed-origins=${APP_WEB_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
app.payment.enabled=${APP_PAYMENT_ENABLED:false}
app.payment.provider=${APP_PAYMENT_PROVIDER:razorpay}
app.payment.key-id=${APP_PAYMENT_RAZORPAY_KEY_ID:}
app.payment.key-secret=${APP_PAYMENT_RAZORPAY_KEY_SECRET:}
app.payment.business-name=${APP_PAYMENT_BUSINESS_NAME:Umashiv}
app.payment.description=${APP_PAYMENT_DESCRIPTION:Support Umashiv}
app.payment.currency=${APP_PAYMENT_CURRENCY:INR}
app.payment.order-base-url=${APP_PAYMENT_RAZORPAY_ORDER_URL:https://api.razorpay.com/v1/orders}