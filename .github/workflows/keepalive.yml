name: Backend Keepalive

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping-health-endpoint:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: |
          if [ -z "$HEALTHCHECK_URL" ]; then
            echo "RENDER_HEALTHCHECK_URL secret is not configured."
            exit 1
          fi

          curl --fail --silent --show-error --max-time 30 "$HEALTHCHECK_URL"
